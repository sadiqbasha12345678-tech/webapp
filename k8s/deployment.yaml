apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web-app

  template:

    metadata:
      labels:
        app: web-app

    spec:

      containers:

      - name: web-app

        image: sadiqdockerhub/web-app:v1
        imagePullPolicy: Always 

        ports:

        - containerPort: 8080
